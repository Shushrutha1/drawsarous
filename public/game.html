<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawsarous - Game</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="winnerOverlay" class="winner-screen">
        <div class="winner-content">
            <h1 style="font-size: 4rem;">🏆</h1>
            <h2>WE HAVE A WINNER!</h2>
            <h1 id="winnerName" style="color: #f7d794; font-size: 3rem;">---</h1>
            <p id="winnerScore" style="font-size: 1.5rem;"></p>
            <p style="margin-top: 20px; color: #4ecca3;">New game starting soon...</p>
        </div>
    </div>

    <header class="game-header">
        <div class="header-left">
            <h1 class="title">🎨 Drawsarous</h1>
            <span id="roomDisplay"></span>
        </div>
        <div id="timerContainer">
            ⏱ <span id="timer">60</span>s
        </div>
        <div id="wordDisplay"></div>
    </header>

    <nav class="toolbar">
        <button id="playerListBtn">👥 Players (<span id="playerCount">0</span>)</button>
        <div class="tool-group">
            <label>Color</label>
            <input type="color" id="colorPicker" value="#000000">
        </div>
        <div class="tool-group">
            <label>Size</label>
            <input type="range" id="brushSize" min="1" max="20" value="3">
        </div>
        <button id="eraser" class="btn-secondary">Eraser</button>
        <button id="clear" class="btn-danger">Clear Board</button>
        <button id="quitBtn" class="btn-exit">Quit Game</button>
    </nav>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Players & Scores</h2>
            <hr>
            <ul id="userList"></ul>
        </div>
    </div>
    <div id="wordPicker" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#16213e; padding:30px; border-radius:20px; z-index:10000; text-align:center; border: 2px solid #4ecca3;">
    <h3>Choose a Word</h3>
    <div id="wordOptions"></div>
</div>
    <main class="game-container">
    
    <aside class="sidebar-scoreboard">
        <div class="scoreboard-header">🏆 Rankings</div>
        <ul id="liveScoreboard"></ul>
    </aside>

    <section class="canvas-wrapper">
        <div id="drawerNotification" class="system-banner">Waiting...</div>
        <canvas id="board" width="800" height="550"></canvas>
    </section>

    <section class="chat-container">
        <h3 id="chatTitle">Chat</h3>
        <div id="chat"></div>
        <div class="chat-input-wrapper">
            <input type="text" id="chatInput" placeholder="Type your guess here...">
        </div>
    </section>

</main>

    <script src="script.js"></script>
</body>
</html>
